        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            doc, 
            onSnapshot, 
            getDocs, 
            setDoc, 
            updateDoc, 
            deleteDoc, 
            writeBatch 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const rawDb = getFirestore(app, "ai-studio-ee7cee26-5951-4a6e-a1e6-43a809e2c613");

        window.customFirestoreDb = {
            collection(collectionPath) {
                const colRef = collection(rawDb, collectionPath);
                return {
                    doc(docId) {
                        const docRef = doc(rawDb, collectionPath, docId);
                        return {
                            ref: docRef,
                            set(data) {
                                return setDoc(docRef, data);
                            },
                            update(data) {
                                return updateDoc(docRef, data);
                            },
                            delete() {
                                return deleteDoc(docRef);
                            }
                        };
                    },
                    onSnapshot(onNext, onError) {
                        return onSnapshot(colRef, (snapshot) => {
                            const compatSnapshot = {
                                forEach(callback) {
                                    snapshot.forEach((d) => {
                                        callback({
                                            id: d.id,
                                            data() {
                                                const fields = d.data();
                                                if (fields && !fields.id) {
                                                    fields.id = d.id;
                                                }
                                                return fields;
                                            }
                                        });
                                    });
                                }
                            };
                            onNext(compatSnapshot);
                        }, (err) => {
                            if (onError) onError(err);
                        });
                    },
                    get() {
                        return getDocs(colRef).then((snapshot) => {
                            return {
                                forEach(callback) {
                                    snapshot.forEach((d) => {
                                        callback({
                                            id: d.id,
                                            data() {
                                                const fields = d.data();
                                                if (fields && !fields.id) {
                                                    fields.id = d.id;
                                                }
                                                return fields;
                                            }
                                        });
                                    });
                                }
                            };
                        });
                    }
                };
            },
            batch() {
                const batch = writeBatch(rawDb);
                return {
                    set(compatDoc, data) {
                        batch.set(compatDoc.ref, data);
                    },
                    delete(compatDoc) {
                        batch.delete(compatDoc.ref);
                    },
                    commit() {
                        return batch.commit();
                    }
                };
            }
        };
    </script>

            const metrics = useMemo(() => {
                const paid = orders.filter(o => o.paymentStatus === 'Paid');
                const revenue = paid.reduce((sum, o) => sum + o.totalAmount, 0);
                const itemsCount = products.length;
                const ordersCount = orders.length;
                const customersCount = users.filter(u => u.role === 'customer').length;
                return { revenue, itemsCount, ordersCount, customersCount };

            // Navigation trigger wrapper
            const navigateTo = (newTab, params = {}) => {
                setTab(newTab);

            // Actions: User Management (Client-Side Local Storage Database with Cloud Security compatibility)
            const handleLogin = (e) => {
                e.preventDefault();
                const cleanEmail = loginEmail.trim().toLowerCase();
                
                console.log(`[FIREBASE CLOUD] SELECT * FROM users WHERE email = '${cleanEmail}' AND role = '${loginRole}';`);
                const matched = users.find(u => u.email.toLowerCase() === cleanEmail && u.role === loginRole);
                if (matched) {
                    setCurrentUser(matched);
                    triggerToast("Selamat datang kembali, " + matched.fullName + "!");
                    addNotificationLocal(matched.id, "Login Berhasil", "Masuk berhasil (Database Cloud Terintegrasi).");
                    navigateTo('home');

                    triggerToast("Email salah atau peran tidak sesuai!");
                }
            };

            const handleRegister = (e) => {
                e.preventDefault();
                const cleanEmail = regEmail.trim().toLowerCase();
                const cleanName = regName.trim();

                if (cleanName.length < 2) {
                    triggerToast("Nama minimal harus 2 karakter!");
                    return;
                }

                console.log(`[FIREBASE CLOUD] SELECT id FROM users WHERE email = '${cleanEmail}';`);
                const exists = users.find(u => u.email.toLowerCase() === cleanEmail);
                if (exists) {
                    triggerToast("E-mail sudah terdaftar di database!");
                    return;
                }

                const newUserId = 'USR-' + Date.now();
                const newU = {
                    id: newUserId,
                    fullName: cleanName,
                    email: cleanEmail,
                    role: regRole
                };

                console.log(`[FIREBASE CLOUD] INSERT INTO users (id, fullName, email, role) VALUES ('${newUserId}', '${cleanName}', '${cleanEmail}', '${regRole}');`);
                
                db.collection('users').doc(newUserId).set(newU)
                    .then(() => {
                        setCurrentUser(newU);
                        triggerToast("Pendaftaran Berhasil! Akun terdaftar.");
                        addNotificationLocal(newUserId, "Akun Baru Dibuat", "Halo " + cleanName + ", selamat bergabung di hub merchandise kebanggaan Unpad.");
                        navigateTo('home');
                    })
                    .catch(err => {
                        console.error(err.message || String(err));
                        triggerToast("Pendaftaran gagal: " + err.message);
                    });
            };

            // Actions: Cart operations
            const addToCart = (pId, quantity = 1) => {
                const prd = products.find(p => p.id === pId);
                if (!prd) return;
                const currentQtyInCart = cart.find(item => item.productId === pId)?.quantity || 0;
                if (prd.stock < currentQtyInCart + quantity) {
                    triggerToast("Maaf! Jumlah melebihi stok yang tersedia.");
                    return;
                }
                setCart(prev => {
                    const exists = prev.find(item => item.productId === pId);
                    if (exists) {
                        return prev.map(item => item.productId === pId ? { ...item, quantity: item.quantity + quantity } : item);
                    }
                    return [...prev, { id: 'CRT-' + Date.now(), productId: pId, quantity }];
                });
                triggerToast("Dimasukkan ke keranjang: " + prd.productName);
            };

            const updateCartQuantity = (pId, newQty) => {
                if (newQty <= 0) {
                    setCart(prev => prev.filter(item => item.productId !== pId));
                    return;
                }
                const prd = products.find(p => p.id === pId);
                if (prd && newQty > prd.stock) {
                    triggerToast("Stok tidak mencukupi!");
                    return;
                }
                setCart(prev => prev.map(item => item.productId === pId ? { ...item, quantity: newQty } : item));
            };

            const removeFromCart = (pId) => {
                setCart(prev => prev.filter(item => item.productId !== pId));
                triggerToast("Item dihapus dari keranjang.");
            };

            // Actions: Check out and simulated payments
            const handlePlaceOrder = (e) => {
                e.preventDefault();
                if (cart.length === 0 || !currentUser) return;
                
                // Inventory adjustment check
                let stockCheckSucceeded = true;
                const nextProducts = products.map(p => {
                    const cartItem = cart.find(ci => ci.productId === p.id);
                    if (cartItem) {
                        if (p.stock < cartItem.quantity) {
                            stockCheckSucceeded = false;
                        }
                        return { ...p, stock: p.stock - cartItem.quantity };
                    }
                    return p;
                });

                if (!stockCheckSucceeded) {
                    triggerToast("Pesanan gagal! Salah satu item dalam keranjang kehabisan stok.");
                    return;
                }

                // Create Order object matching types
                const orderId = 'ORD-' + Math.floor(1000 + Math.random() * 9000);
                let totalAmount = 0;
                const orderItems = cart.map((it, idx) => {
                    const p = products.find(prd => prd.id === it.productId);
                    totalAmount += p.price * it.quantity;
                    return {
                        id: 'ORI-' + Date.now() + '-' + idx,
                        orderId,
                        productId: it.productId,
                        quantity: it.quantity,
                        price: p.price
                    };
                });

                const newOrder = {
                    id: orderId,
                    userId: currentUser.id,
                    totalAmount,
                    paymentStatus: 'Pending',
                    orderStatus: 'Pending Payment',
                    createdAt: new Date().toISOString(),
                    items: orderItems,
                    shippingAddress: checkoutAddress,
                    phone: checkoutPhone
                };

                // Commit stock deduction & insert order atomically in Firestore Batch
                const batch = db.batch();
                nextProducts.forEach(p => {
                    if (cart.some(ci => ci.productId === p.id)) {
                        batch.set(db.collection('products').doc(p.id), p);
                    }
                });
                batch.set(db.collection('orders').doc(orderId), newOrder);

                batch.commit()
                    .then(() => {
                        // Clear state
                        setCheckoutAddress('');
                        setCheckoutPhone('');
                        triggerToast("Pesanan Berhasil Dibuat! Invoice #" + orderId);
                        navigateTo('qris', { orderId });
                    })
                    .catch(err => {
                        console.error(err.message || String(err));
                        triggerToast("Gagal memproses pesanan: " + err.message);
                    });

                    if (orderToUpdate) {
                        db.collection('orders').doc(orderId).update({
                            paymentStatus: 'Paid',
                            orderStatus: 'Processing'
                        }).then(() => {
                            addNotificationLocal(orderToUpdate.userId, "Pembayaran Diterima!", `Pembayaran untuk order ${orderId} sebesar Rp ${orderToUpdate.totalAmount.toLocaleString('id-ID')} telah sukses dikonfirmasi via QRIS.`);

                            });
                        }).catch(err => console.error(err.message || String(err)));
                    }

                    // Play audio warning simulation
                    try {
                        const audio = new AudioContext();
                        const osc = audio.createOscillator();
                        const gain = audio.createGain();
                        osc.connect(gain);
                        gain.connect(audio.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(880, audio.currentTime);
                        osc.frequency.setValueAtTime(1200, audio.currentTime + 0.15);
                        gain.gain.setValueAtTime(0.3, audio.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.35);
                        osc.start();
                        osc.stop(audio.currentTime + 0.4);
                    } catch (e) {}

                    setCart([]);
                    setIsSimulatingPayment(false);
                    navigateTo('success', { orderId });
                }, 2500);

                                                document.getElementById('btn-tab-seeder').className = "flex-1 py-1.5 px-2 bg-white text-slate-900 rounded-xl font-bold shadow-xs transition text-center cursor-pointer font-mono text-[9px] uppercase";
                                                document.getElementById('btn-tab-blueprints').className = "flex-1 py-1.5 px-2 text-slate-600 hover:text-slate-900 rounded-xl font-bold transition text-center cursor-pointer font-mono text-[9px] uppercase";
                                            }} 
                                            className="flex-1 py-1.5 px-2 text-slate-600 hover:text-slate-900 rounded-xl font-bold transition text-center cursor-pointer font-mono text-[9px] uppercase"
                                        >
                                            3. Dataset JSON Raw
                                        </button>
                                        <button 
                                            type="button"
                                            id="btn-tab-blueprints"
                                            onClick={() => {
                                                document.getElementById('tab-setting').style.display = 'none';
                                                document.getElementById('tab-schema').style.display = 'none';
                                                document.getElementById('tab-seeder').style.display = 'none';
                                                document.getElementById('tab-blueprints').style.display = 'block';

                                                document.getElementById('btn-tab-setting').className = "flex-1 py-1.5 px-2 text-slate-600 hover:text-slate-900 rounded-xl font-bold transition text-center cursor-pointer font-mono text-[9px] uppercase";
                                                document.getElementById('btn-tab-schema').className = "flex-1 py-1.5 px-2 text-slate-600 hover:text-slate-900 rounded-xl font-bold transition text-center cursor-pointer font-mono text-[9px] uppercase";
                                                document.getElementById('btn-tab-seeder').className = "flex-1 py-1.5 px-2 text-slate-600 hover:text-slate-900 rounded-xl font-bold transition text-center cursor-pointer font-mono text-[9px] uppercase";
                                                document.getElementById('btn-tab-blueprints').className = "flex-1 py-1.5 px-2 bg-white text-slate-900 rounded-xl font-bold shadow-xs transition text-center cursor-pointer font-mono text-[9px] uppercase";
                                            }} 
                                            className="flex-1 py-1.5 px-2 text-slate-600 hover:text-slate-900 rounded-xl font-bold transition text-center cursor-pointer font-mono text-[9px] uppercase"
                                        >
                                            4. Multi-Stack Blueprint
                                        </button>
                                    </div>

                                    {/* Tab 1: Settings / Status */}
                                    <div id="tab-setting" className="space-y-4">
                                        <div className="bg-emerald-50 border border-emerald-100 p-4 rounded-2xl flex items-start space-x-3">
                                            <Icon name="CheckCircle" size={16} className="text-emerald-500 shrink-0 mt-0.5" />
                                            <div>
                                                <h4 className="font-bold text-emerald-800">Database Berjalan 100% Mandiri di GitHub Pages</h4>
                                                <p className="text-emerald-700 text-[11px] leading-relaxed mt-1">
                                                    Selamat! Database aplikasi ini menggunakan **Web Storage (LocalStorage)** terenkripsi datar di sisi peramban. Sistem ini bekerja secara real-time, menyimpan setiap registrasi akun baru, riwayat pesanan (Orders), dan kategori barang tanpa membutuhkan server luar atau API eksternal yang lambat.
                                                </p>
                                            </div>
                                        </div>

                                        <div className="bg-slate-50 border p-4 rounded-2xl space-y-3">
                                            <h4 className="font-bold text-slate-800 text-xs">Informasi Sesi Serverless</h4>
                                            <div className="grid grid-cols-2 gap-4 text-[11px]">
                                                <div>
                                                    <span className="text-slate-400 font-mono block">METRIK AKTIF</span>
                                                    <span className="font-bold text-slate-800 font-mono">{users.length} Akun, {products.length} Barang</span>
                                                </div>
                                                <div>
                                                    <span className="text-slate-400 font-mono block">PERSISTENSI</span>
                                                    <span className="bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded text-[9px] font-bold">LOKAL AMAN (HTML5)</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-4 bg-orange-50 border border-orange-100 rounded-2xl flex items-center justify-between">
                                            <div>
                                                <h5 className="font-bold text-orange-900 text-xs">Pembersihan & Reset Pabrik</h5>
                                                <p className="text-[10px] text-orange-700 mt-0.5 max-w-[400px]">Hapus seluruh memori perubahan, kembalikan data barang, akun demo utama, serta transaksi ke sedia kala.</p>
                                            </div>
                                            <button 
                                                type="button" 
                                                onClick={handleResetDatabase}
                                                className="bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 px-4 rounded-xl text-[10px] font-mono cursor-pointer transition"
                                            >
                                                RESET DATA
                                            </button>
                                        </div>
                                    </div>

                                    {/* Tab 2: Registered Accounts */}
                                    <div id="tab-schema" className="space-y-4" style={{ display: 'none' }}>
                                        <div className="flex justify-between items-center text-slate-400">
                                            <span className="font-mono text-[10px] uppercase font-bold text-slate-500">Tabel Akun Pengguna Terdaftar (`users`)</span>
                                        </div>
                                        
                                        <div className="bg-slate-950 text-slate-300 font-mono text-[10px] rounded-2xl border p-4 max-h-64 overflow-y-auto space-y-2">
                                            <div className="grid grid-cols-3 border-b border-slate-800 pb-1.5 font-bold text-slate-400">
                                                <span>NAMA</span>
                                                <span>EMAIL</span>
                                                <span className="text-right">HAK AKSES</span>
                                            </div>
                                            {users.map(u => (
                                                <div key={u.id} className="grid grid-cols-3 border-b border-slate-900 pb-1 hover:text-white transition">
                                                    <span className="truncate">{u.fullName}</span>
                                                    <span className="truncate text-blue-400">{u.email}</span>
                                                    <span className="text-right text-purple-400 font-bold uppercase text-[9px]">{u.role}</span>
                                                </div>
                                            ))}
                                        </div>
                                        <p className="text-[10px] text-slate-400 italic">Anda dapat mendaftarkan akun baru melalui tombol 'Daftar' di menu masuk, akun baru akan secara otomatis ditambahkan ke tabel database lokal di atas.</p>
                                    </div>

                                    {/* Tab 3: Dataset JSON */}
                                    <div id="tab-seeder" className="space-y-4" style={{ display: 'none' }}>
                                        <div className="flex justify-between items-center text-slate-400">
                                            <span className="font-mono text-[10px] uppercase font-bold text-slate-500">Raw JSON Database Memory Backup</span>
                                            <button 
                                                type="button"
                                                onClick={() => {
                                                    const rawMemory = {
                                                        users,
                                                        products,
                                                        categories,
                                                        orders,
                                                        notifications
                                                    };
                                                    navigator.clipboard.writeText(JSON.stringify(rawMemory, null, 2));
                                                    triggerToast("Raw JSON tersalin!");
                                                }}
                                                className="text-emerald-600 hover:text-emerald-750 font-bold flex items-center gap-1 bg-emerald-50 px-2 py-1 rounded-lg cursor-pointer transition text-[10px] font-mono"
                                            >
                                                <Icon name="Copy" size={12} />
                                                <span>SALIN DATABASE RAW</span>
                                            </button>
                                        </div>

                                        <pre 
                                            id="seeder-code-block" 
                                            className="bg-slate-900 border text-slate-300 p-4 rounded-2xl h-56 overflow-y-auto font-mono text-[10px] leading-relaxed text-left opacity-90"
                                        >
                                            {JSON.stringify({ users, products, categories, orders }, null, 2)}
                                        </pre>
                                    </div>

                                    {/* Tab 4: Multi-Stack and Deployment Blueprints */}
                                    <div id="tab-blueprints" className="space-y-4 font-sans" style={{ display: 'none' }}>
                                        <div className="bg-sky-50 border border-sky-100 p-4 rounded-2xl flex items-start space-x-3 text-sky-850">
                                            <Icon name="Layers" size={16} className="text-sky-500 shrink-0 mt-0.5" />
                                            <div>
                                                <h4 className="font-bold text-sky-800 text-xs">Cetak Biru (Blueprint) Multi-Stack & Hosting</h4>
                                                <p className="text-sky-700 text-[10px] leading-relaxed mt-1">
                                                    Sesuai kebutuhan deployment mandiri dari awal, kami telah menyusun berkas-berkas skema database relasional dan contoh controller backend siap saji langsung di struktur folder GitHub repositori Anda (`/src/blueprints/`).
                                                </p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3.5">
                                            {/* Front-End Blueprint Card */}
                                            <div className="p-4 bg-slate-50 border border-slate-100 rounded-2xl space-y-2.5">
                                                <span className="text-[9px] bg-sky-100 text-sky-800 px-2 py-0.5 rounded-full font-bold font-mono tracking-wider">🌐 FRONT-END</span>
                                                <h5 className="font-bold text-slate-800 text-[11px]">HTML, CSS, Tailwind & Vanillajs SPA</h5>
                                                <p className="text-slate-500 text-[10px] leading-normal font-sans">Aplikasi saat ini telah siap 100% dideploy tanpa server backend. Sangat ringan untuk presentasi di GitHub Pages.</p>
                                                <div className="bg-white p-2.5 rounded-xl border border-slate-200 text-[10px] font-mono leading-tight text-slate-600 space-y-1 block">
                                                    <div><strong>Host Mandiri</strong>: GitHub Pages / Vercel</div>
                                                    <div><strong>Frameworks</strong>: React, Tailwind, Lucide</div>
                                                </div>
                                            </div>

                                            {/* Back-End Blueprint Card */}
                                            <div className="p-4 bg-slate-50 border border-slate-100 rounded-2xl space-y-2.5">
                                                <span className="text-[9px] bg-purple-100 text-purple-800 px-2 py-0.5 rounded-full font-bold font-mono tracking-wider">⚙️ BACK-END API</span>
                                                <h5 className="font-bold text-slate-800 text-[11px]">PHP (Laravel), Node.js (Express), & Django</h5>
                                                <p className="text-slate-500 text-[10px] leading-normal font-sans">Kami telah menaruh berkas-berkas pengontrol logic API untuk Anda salin ke server VPS:</p>
                                                <div className="bg-slate-900 text-slate-200 p-2.5 rounded-xl text-[10px] font-mono space-y-1 block">
                                                    <div className="flex justify-between"><span>Laravel:</span> <span className="text-amber-300 font-bold">laravel_controller.php</span></div>
                                                    <div className="flex justify-between"><span>Node.js:</span> <span className="text-emerald-300 font-bold">nodejs_server.js</span></div>
                                                    <div className="flex justify-between"><span>Django:</span> <span className="text-sky-300 font-bold">django_views.py</span></div>
                                                </div>
                                            </div>

                                            {/* Database Blueprint Card */}
                                            <div className="p-4 bg-slate-50 border border-slate-100 rounded-2xl space-y-2.5">
                                                <span className="text-[9px] bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-full font-bold font-mono tracking-wider">🗄️ DATABASE SQL</span>
                                                <h5 className="font-bold text-slate-800 text-[11px]">MySQL & PostgreSQL Skema</h5>
                                                <p className="text-slate-500 text-[10px] leading-normal font-sans">Telah siap relasi tabel Users, Categories, Products, Orders, dan Order Items yang bersih:</p>
                                                <div className="bg-slate-950 text-slate-300 p-2.5 rounded-xl text-[10px] font-mono space-y-1 block">
                                                    <div className="flex justify-between"><span>MySQL:</span> <span className="text-emerald-400 font-bold">schema.sql</span></div>
                                                    <div className="flex justify-between"><span>Postgres:</span> <span className="text-cyan-400 font-bold">postgresql_schema.sql</span></div>
                                                </div>
                                            </div>

                                            {/* Deployment Blueprint Card */}
                                            <div className="p-4 bg-slate-50 border border-slate-100 rounded-2xl space-y-2.5">
                                                <span className="text-[9px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-bold font-mono tracking-wider">🚀 PLAYBOOK HOSTING</span>
                                                <h5 className="font-bold text-slate-800 text-[11px]">Panduan Vercel, Netlify & cPanel</h5>
                                                <p className="text-slate-500 text-[10px] leading-normal font-sans">Langkah-demi-langkah setup reverse proxy Nginx, pm2, migrations, dan deploy hosting cPanel:</p>
                                                <div className="bg-indigo-50 border border-indigo-100 p-2.5 rounded-xl text-[10px] font-mono text-indigo-800 flex items-center justify-between">
                                                    <span>📂 /src/blueprints/README.md</span>
                                                    <button 
                                                        type="button"
                                                        onClick={() => {
                                                            navigator.clipboard.writeText("Buka berkas /src/blueprints/README.md");
                                                            triggerToast("Lokasi file README tersalin!");
                                                        }}
                                                        className="text-indigo-950 font-bold hover:underline cursor-pointer uppercase text-[9px]"
                                                    >
                                                        Salin Jalur
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                </div>

                                {/* Footer */}
                                <div className="bg-slate-50 px-6 py-4 flex items-center justify-between border-t border-slate-200">
                                    <span className="text-[10px] text-slate-500 font-medium">Sistem database browser ini aman, responsif, dan siap kirim ke GitHub Pages!</span>
                                    <button 
                                        type="button"
                                        onClick={() => setShowMysqlModal(false)}
                                        className="bg-slate-900 hover:bg-slate-800 text-white font-bold py-2 px-5 rounded-xl uppercase tracking-wider font-mono cursor-pointer transition"
                                    >
                                        TUTUP
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CRUD CATEGORY MODAL DIALOG */}
                    {showCatModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center z-50 p-4 text-left">
                            <div className="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl animate-fade-in text-slate-800">
                                <div className="bg-slate-900 text-white p-4 flex items-center justify-between">
                                    <h3 className="font-bold text-xs sm:text-sm font-mono tracking-wide">{editingCat ? 'PERBARUI KATEGORI' : 'KATEGORI BARU'}</h3>
                                    <button onClick={() => setShowCatModal(false)} className="text-slate-400 hover:text-white"><Icon name="X" size={18} /></button>
                                </div>
                                <form onSubmit={saveCategory} className="p-5 space-y-4 text-xs">
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-400 font-mono font-bold block uppercase">NAMA KATEGORI</label>
                                        <input type="text" required value={cName} onChange={e => setCName(e.target.value)} placeholder="Contoh: Outerwear" className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-slate-850 focus:outline-hidden" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-400 font-mono font-bold block uppercase">DESKRIPSI SINGKAT</label>
                                        <textarea value={cDesc} onChange={e => setCDesc(e.target.value)} placeholder="Tuliskan detail kategori..." className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-slate-850 focus:outline-hidden h-20" />
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 hover:bg-slate-900 text-white font-bold py-2.5 rounded-xl uppercase tracking-wider font-mono">SIMPAN REVENUE</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* CRUD PRODUCT MODAL DIALOG */}
                    {showProductModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center z-50 p-4 text-left overflow-y-auto">
                            <div className="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl text-slate-850 text-slate-800">
                                <div className="bg-slate-900 text-white p-4 flex items-center justify-between">
                                    <h3 className="font-bold text-xs sm:text-sm font-mono tracking-wide">{editingProduct ? 'PERBARUI MERCHANDISE' : 'MERCHANDISE RESMI BARU'}</h3>
                                    <button onClick={() => setShowProductModal(false)} className="text-slate-400 hover:text-white"><Icon name="X" size={18} /></button>
                                </div>
                                <form onSubmit={saveProduct} className="p-5 space-y-4 text-xs h-[80vh] overflow-y-auto">
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-400 font-mono font-bold block uppercase">NAMA BARANG MERCHANDISE</label>
                                        <input type="text" required value={pName} onChange={e => setPName(e.target.value)} placeholder="Contoh: Cap Unmer" className="w-full bg-slate-50 border rounded-xl px-3 py-2 focus:outline-hidden" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[10px] text-slate-400 font-mono font-bold block uppercase">PILIK KATEGORI</label>
                                            <select value={pCat} onChange={e => setPCat(e.target.value)} required className="w-full bg-slate-50 border rounded-xl px-2 py-2 cursor-pointer focus:outline-hidden">
                                                {categories.map(c => <option key={c.id} value={c.id}>{c.categoryName}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] text-slate-400 font-mono font-bold block uppercase">STOK BARANG MASUK</label>
                                            <input type="number" required min="0" value={pStock} onChange={e => setPStock(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-3 py-2 focus:outline-hidden" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[10px] text-slate-400 font-mono font-bold block uppercase">HARGA SATUAN (Rupiah)</label>
                                            <input type="number" required min="1000" value={pPrice} onChange={e => setPPrice(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-3 py-2 focus:outline-hidden font-bold" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] text-slate-400 font-mono font-bold block uppercase">URL IMAGES / FOTO BARANG</label>
                                            <input type="text" value={pImage} onChange={e => setPImage(e.target.value)} placeholder="https://..." className="w-full bg-slate-50 border rounded-xl px-3 py-2 focus:outline-hidden" />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-slate-400 font-mono font-bold block uppercase">PENJELASAN PRODUK DETAIL</label>
                                        <textarea required value={pDesc} onChange={e => setPDesc(e.target.value)} className="w-full bg-slate-50 border rounded-xl px-3 py-2 h-20 focus:outline-hidden" />
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 hover:bg-slate-900 text-white font-bold py-2.5 rounded-xl uppercase tracking-wider font-mono">SIMPAN DATA MERCHANDISE</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        
        function mountApp() {
            if (window.customFirestoreDb) {
                root.render(<App />);
            } else {
                setTimeout(mountApp, 50);
            }
        }
        mountApp();
    </script>
</body>
</html>
