<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unpad Merch Hub - Toko Merchandise Resmi Kampus</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        unpad: {
                            gold: '#FFC72C',
                            darkblue: '#0F2C59',
                            blue: '#1A5F7A',
                            light: '#F8F1F1'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- MySQL Database & Service Utilities (No Firebase) -->
    <!-- Main App Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Configuration variables for live MySQL API integration
        let initialMysqlApiUrl = localStorage.getItem('cmh_mysql_api_url') || '';
        let initialMysqlApiEnabled = localStorage.getItem('cmh_mysql_api_enabled') === 'true';

        console.log(`[MYSQL CONFIG] Loaded. Live Server Mode: ${initialMysqlApiEnabled ? "ON" : "OFF"}. Endpoint: ${initialMysqlApiUrl || "Simulated Local Storage"}`);

        // Custom Icon wrapper to render Lucide CDN icons inside React
        const Icon = ({ name, size = 16, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide) {
                    const temp = document.createElement('i');
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    temp.setAttribute('data-lucide', kebabName);
                    containerRef.current.innerHTML = '';
                    containerRef.current.appendChild(temp);
                    window.lucide.createIcons({
                        nodeList: [temp],
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                            stroke: 'currentColor',
                            'stroke-width': 2,
                            'stroke-linecap': 'round',
                            'stroke-linejoin': 'round',
                            fill: 'none'
                        }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center shrink-0"></span>;
        };

        // Initial Data Default States
        const initialCategories = [
            { id: 'CAT-201', categoryName: 'T-Shirts', description: 'Kaos katun premium berkualitas tinggi dengan desain kampus modern.' },
            { id: 'CAT-202', categoryName: 'Hoodies', description: 'Jaket hoodie hangat dengan sulaman logo kampus timbul.' },
            { id: 'CAT-203', categoryName: 'Tote Bags', description: 'Tas jinjing kanvas serbaguna, ramah lingkungan dan kuat.' },
            { id: 'CAT-204', categoryName: 'Stickers', description: 'Stiker vinyl anti air mengkilap untuk laptop, dll.' },
            { id: 'CAT-205', categoryName: 'Tumblers', description: 'Botol minum termos stainless steel tahan panas/dingin.' },
            { id: 'CAT-206', categoryName: 'Keychains', description: 'Gantungan kunci akrilik tebal dua sisi dengan desain maskot.' },
        ];

        const initialProducts = [
            { id: 'PRD-101', categoryId: 'CAT-201', productName: 'Classic Campus Tee - Varsity Blue', description: 'Kaos katun combed 30s premium dengan sablon plastisol Varsity khas kampus. Sangat lembut, menyerap keringat, dan tahan lama.', price: 95000, stock: 45, image: 'https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=600' },
            { id: 'PRD-102', categoryId: 'CAT-201', productName: 'Minimalist Logo Tee - Off White', description: 'Kaos desain minimalis eksklusif dengan bordir micro logo kampus di bagian dada kiri. Terbuat dari katun organik supersoft.', price: 110000, stock: 30, image: 'https://images.unsplash.com/photo-1562157873-818bc0726f68?w=600' },
            { id: 'PRD-103', categoryId: 'CAT-202', productName: 'Signature Hoodie - Midnight Navy', description: 'Hoodie pullover premium berdensitas tinggi (heavyweight cotton fleece 330gsm). Saku kanguru fungsional, tali serut tebal, dan sulaman tebal.', price: 245000, stock: 20, image: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=600' },
            { id: 'PRD-104', categoryId: 'CAT-202', productName: 'Athletic Pullover - Heather Grey', description: 'Hoodie olahraga kasual dengan bahan katun lentur semi-fleece. Cocok untuk sesi belajar di perpustakaan atau olahraga.', price: 220000, stock: 12, image: 'https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=600' },
            { id: 'PRD-105', categoryId: 'CAT-203', productName: 'Eco-Canvas Campus Tote Bag', description: 'Tote bag ramah lingkungan serbaguna dari bahan kanvas katun tebal 14oz. Menampung laptop hingga 15.6 inci dengan ritsleting.', price: 65000, stock: 60, image: 'https://images.unsplash.com/photo-1544816155-12df9643f363?w=600' },
            { id: 'PRD-106', categoryId: 'CAT-205', productName: 'Thermal Flask Tumbler - Onyx Black', description: 'Tumbler thermo premium modern berbahan stainless steel food grade SUS316. Mampu mempertahankan suhu minuman hingga 18 jam.', price: 135000, stock: 25, image: 'https://images.unsplash.com/photo-1577937927133-66ef06acdf18?w=600' },
            { id: 'PRD-107', categoryId: 'CAT-204', productName: 'Aesthetic Vinyl Sticker Pack', description: 'Satu set berisi 10 stiker vinyl potong potong bertema kehidupan kampus, maskot menggemaskan, dan ilustrasi seni modern. Anti air.', price: 15000, stock: 120, image: 'https://images.unsplash.com/photo-1572375995301-40164f1fd0bc?w=600' },
            { id: 'PRD-108', categoryId: 'CAT-206', productName: 'Double-Sided Mascot Acrylic Keychain', description: 'Gantungan kunci akrilik kristal ultra bening 4mm berdesain bolak-balik beresolusi tinggi. Lengkap dengan gantungan logam kokoh.', price: 20000, stock: 80, image: 'https://images.unsplash.com/photo-1582139329536-e7284fece509?w=600' }
        ];

        function App() {
            // Persistence setup identical to React localStorage keys
            const [users, setUsers] = useState(() => {
                const saved = localStorage.getItem('cmh_users');
                if (saved) return JSON.parse(saved);
                const defaults = [
                    { id: 'USR-001', fullName: 'Faris Rifqy', email: 'customer@campus.com', role: 'customer' },
                    { id: 'USR-002', fullName: 'Ruben David', email: 'staff@campus.com', role: 'staff' },
                ];
                localStorage.setItem('cmh_users', JSON.stringify(defaults));
                return defaults;
            });

            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('cmh_current_user');
                if (saved) return JSON.parse(saved);
                return users[0]; // Auto log-in as customer for frictionless experience
            });

            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('cmh_categories');
                if (saved) return JSON.parse(saved);
                localStorage.setItem('cmh_categories', JSON.stringify(initialCategories));
                return initialCategories;
            });

            const [products, setProducts] = useState(() => {
                const saved = localStorage.getItem('cmh_products');
                if (saved) return JSON.parse(saved);
                localStorage.setItem('cmh_products', JSON.stringify(initialProducts));
                return initialProducts;
            });

            const [cart, setCart] = useState(() => {
                const saved = localStorage.getItem('cmh_cart');
                return saved ? JSON.parse(saved) : [];
            });

            const [orders, setOrders] = useState(() => {
                const saved = localStorage.getItem('cmh_orders');
                if (saved) return JSON.parse(saved);
                const defaultOrder = [{
                    id: 'ORD-8941',
                    userId: 'USR-001',
                    totalAmount: 160000,
                    paymentStatus: 'Paid',
                    orderStatus: 'Completed',
                    createdAt: '2026-06-05T14:30:00Z',
                    items: [
                        { id: 'ORI-101', orderId: 'ORD-8941', productId: 'PRD-101', quantity: 1, price: 95000 },
                        { id: 'ORI-102', orderId: 'ORD-8941', productId: 'PRD-105', quantity: 1, price: 65000 }
                    ]
                }];
                localStorage.setItem('cmh_orders', JSON.stringify(defaultOrder));
                return defaultOrder;
            });

            const [notifications, setNotifications] = useState(() => {
                const saved = localStorage.getItem('cmh_notifications');
                if (saved) return JSON.parse(saved);
                const defaults = [{
                    id: 'NTF-1',
                    userId: 'USR-001',
                    title: 'Pesanan Selesai!',
                    message: 'Pesanan ORD-8941 Anda telah selesai diambil. Terima kasih telah berbelanja!',
                    isRead: false,
                    createdAt: '2026-06-05T16:00:00Z'
                }];
                localStorage.setItem('cmh_notifications', JSON.stringify(defaults));
                return defaults;
            });

            // Navigation state
            const [tab, setTab] = useState('home');
            const [tabParams, setTabParams] = useState({});
            
            // Global search & filters
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('ALL');
            const [priceRange, setPriceRange] = useState(300000);

            // Auth simulation states
            const [loginEmail, setLoginEmail] = useState('');
            const [loginRole, setLoginRole] = useState('customer');
            const [regName, setRegName] = useState('');
            const [regEmail, setRegEmail] = useState('');
            const [regRole, setRegRole] = useState('customer');

            // Notification hub status
            const [showNotifPanel, setShowNotifPanel] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);

            // QRIS and Checkout state
            const [checkoutAddress, setCheckoutAddress] = useState('');
            const [checkoutPhone, setCheckoutPhone] = useState('');
            const [qrisTimer, setQrisTimer] = useState(300); // 5 mins counter
            const [isSimulatingPayment, setIsSimulatingPayment] = useState(false);

            // Staff Modals
            const [showProductModal, setShowProductModal] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [pName, setPName] = useState('');
            const [pCat, setPCat] = useState('');
            const [pPrice, setPPrice] = useState('0');
            const [pStock, setPStock] = useState('0');
            const [pImage, setPImage] = useState('');
            const [pDesc, setPDesc] = useState('');

            const [showMysqlModal, setShowMysqlModal] = useState(false);

            // Dynamically generate SQL Seed statements based on current state
            const generatedSqlSeed = useMemo(() => {
                let sql = `-- ==================================================\n`;
                sql += `-- SQL INSERT SEED DATA GENERATED FROM BROWSER SESSION\n`;
                sql += `-- ==================================================\n\n`;
                sql += `USE unpad_merch_hub;\n\n`;
                
                // Users
                sql += `-- 1. Seeding Users table\n`;
                users.forEach(u => {
                    const cleanName = u.fullName ? u.fullName.replace(/'/g, "''") : "Faris Rifqy";
                    sql += `INSERT INTO users (id, fullName, email, role) VALUES ('${u.id}', '${cleanName}', '${u.email}', '${u.role}') ON DUPLICATE KEY UPDATE fullName=VALUES(fullName);\n`;
                });
                
                // Categories
                sql += `\n-- 2. Seeding Categories table\n`;
                categories.forEach(c => {
                    sql += `INSERT INTO categories (id, categoryName, description) VALUES ('${c.id}', '${c.categoryName.replace(/'/g, "''")}', '${c.description ? c.description.replace(/'/g, "''") : "NULL"}') ON DUPLICATE KEY UPDATE categoryName=VALUES(categoryName);\n`;
                });

                // Products
                sql += `\n-- 3. Seeding Products table\n`;
                products.forEach(p => {
                    const cleanDesc = p.description ? p.description.replace(/'/g, "''") : "";
                    sql += `INSERT INTO products (id, categoryId, productName, description, price, stock, image) VALUES ('${p.id}', '${p.categoryId}', '${p.productName.replace(/'/g, "''")}', '${cleanDesc}', ${p.price}, ${p.stock}, '${p.image}') ON DUPLICATE KEY UPDATE price=VALUES(price), stock=VALUES(stock);\n`;
                });
                
                // Orders
                if (orders && orders.length > 0) {
                    sql += `\n-- 4. Seeding Orders & Order Items table\n`;
                    orders.forEach(o => {
                        sql += `INSERT INTO orders (id, userId, totalAmount, paymentStatus, orderStatus) VALUES ('${o.id}', '${o.userId}', ${o.totalAmount}, '${o.paymentStatus}', '${o.orderStatus}') ON DUPLICATE KEY UPDATE orderStatus=VALUES(orderStatus);\n`;
                        if (o.items && o.items.length > 0) {
                            o.items.forEach(item => {
                                sql += `INSERT INTO order_items (id, orderId, productId, quantity, price) VALUES ('${item.id}', '${o.id}', '${item.productId}', ${item.quantity}, ${item.price}) ON DUPLICATE KEY UPDATE quantity=VALUES(quantity);\n`;
                            });
                        }
                    });
                }
                
                return sql;
            }, [users, categories, products, orders]);

            const [showCatModal, setShowCatModal] = useState(false);
            const [editingCat, setEditingCat] = useState(null);
            const [cName, setCName] = useState('');
            const [cDesc, setCDesc] = useState('');

            // Staff view states
            const [staffSubTab, setStaffSubTab] = useState('summary');
            const [staffSearchQuery, setStaffSearchQuery] = useState('');
            const [staffOrderFilter, setStaffOrderFilter] = useState('ALL');

            // Auto synchronise with localStorage
            useEffect(() => { localStorage.setItem('cmh_users', JSON.stringify(users)); }, [users]);
            useEffect(() => { localStorage.setItem('cmh_current_user', JSON.stringify(currentUser)); }, [currentUser]);
            useEffect(() => { localStorage.setItem('cmh_categories', JSON.stringify(categories)); }, [categories]);
            useEffect(() => { localStorage.setItem('cmh_products', JSON.stringify(products)); }, [products]);
            useEffect(() => { localStorage.setItem('cmh_cart', JSON.stringify(cart)); }, [cart]);
            useEffect(() => { localStorage.setItem('cmh_orders', JSON.stringify(orders)); }, [orders]);
            useEffect(() => { localStorage.setItem('cmh_notifications', JSON.stringify(notifications)); }, [notifications]);

            // MySQL Database API Config States & Controls
            const [mysqlApiUrl, setMysqlApiUrlState] = useState(initialMysqlApiUrl);
            const [mysqlApiEnabled, setMysqlApiEnabledState] = useState(initialMysqlApiEnabled);
            const [isCheckingDb, setIsCheckingDb] = useState(false);
            const [dbStatus, setDbStatus] = useState('unknown'); // 'unknown', 'connected', 'error'

            const updateMysqlSettings = (url, enabled) => {
                const checkedUrl = url.trim();
                localStorage.setItem('cmh_mysql_api_url', checkedUrl);
                localStorage.setItem('cmh_mysql_api_enabled', enabled ? 'true' : 'false');
                setMysqlApiUrlState(checkedUrl);
                setMysqlApiEnabledState(enabled);
                
                // Clear state cache to trigger updates
                if (enabled) {
                    triggerToast("MySQL Live REST API diaktifkan!");
                } else {
                    triggerToast("Beralih ke Mode Simulasi Relasional.");
                }
            };

            // Sync with MySQL on mount or context change
            useEffect(() => {
                const syncFromMysql = async () => {
                    if (!mysqlApiEnabled || !mysqlApiUrl) {
                        console.log("[MYSQL LOG] Menjalankan Simulasi Relasional MySQL.");
                        setDbStatus('unknown');
                        return;
                    }
                    try {
                        setIsCheckingDb(true);
                        const cleanUrl = mysqlApiUrl.replace(/\/$/, '');
                        const res = await fetch(`${cleanUrl}/status`).catch(() => null);
                        if (res && res.ok) {
                            setDbStatus('connected');
                            // Pull products
                            const pRes = await fetch(`${cleanUrl}/api/products`).catch(() => null);
                            if (pRes && pRes.ok) {
                                const pData = await pRes.json();
                                if (pData && pData.length > 0) setProducts(pData);
                            }
                        } else {
                            setDbStatus('error');
                            triggerToast("Gagal terhubung ke REST API MySQL di " + mysqlApiUrl);
                        }
                    } catch (err) {
                        setDbStatus('error');
                        console.error("MySQL Sync Error:", err);
                    } finally {
                        setIsCheckingDb(false);
                    }
                };
                syncFromMysql();
            }, [mysqlApiEnabled, mysqlApiUrl]);

            // Toast helper
            const triggerToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 3500);
            };

            const addNotificationLocal = (uId, title, message) => {
                const newN = {
                    id: 'NTF-' + Date.now(),
                    userId: uId,
                    title,
                    message,
                    isRead: false,
                    createdAt: new Date().toISOString()
                };
                setNotifications(prev => [newN, ...prev]);
            };

            // Business intelligence metrics computed reactively
            const metrics = useMemo(() => {
                const paid = orders.filter(o => o.paymentStatus === 'Paid');
                const revenue = paid.reduce((sum, o) => sum + o.totalAmount, 0);
                const itemsCount = products.length;
                const ordersCount = orders.length;
                const customersCount = users.filter(u => u.role === 'customer').length;
                return { revenue, itemsCount, ordersCount, customersCount };
            }, [orders, products, users]);

            // Navigation trigger wrapper
            const navigateTo = (newTab, params = {}) => {
                setTab(newTab);
                setTabParams(params);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // Actions: User Management (MySQL Integration & Local Storage Simulation)
            const handleLogin = async (e) => {
                e.preventDefault();
                const cleanEmail = loginEmail.trim().toLowerCase();
                
                if (mysqlApiEnabled && mysqlApiUrl) {
                    try {
                        triggerToast("Menghubungi server MySQL API...");
                        const serverUrl = mysqlApiUrl.replace(/\/$/, '');
                        const response = await fetch(`${serverUrl}/api/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: cleanEmail, role: loginRole })
                        }).catch(err => {
                            throw new Error("Gagal menghubungi server API local: " + err.message);
                        });

                        const result = await response.json();
                        if (response.ok && result.status === 'success') {
                            const matched = result.user;
                            
                            // Keep in sync locally
                            setUsers(prev => {
                                if (prev.some(u => u.id === matched.id)) return prev;
                                return [...prev, matched];
                            });

                            setCurrentUser(matched);
                            triggerToast("Selamat datang kembali, " + matched.fullName + " (Login MySQL Server)!");
                            addNotificationLocal(matched.id, "Login Berhasil (MySQL)", "Anda berhasil masuk menggunakan akun terverifikasi di MySQL.");
                            navigateTo('home');
                        } else {
                            triggerToast(result.message || "Email salah atau peran tidak sesuai!");
                        }
                    } catch (err) {
                        console.error("MySQL Live Login failed:", err);
                        triggerToast("Gagal terhubung server, beralih ke Mode Simulasi...");
                        
                        // Local fallback
                        const matched = users.find(u => u.email.toLowerCase() === cleanEmail && u.role === loginRole);
                        if (matched) {
                            setCurrentUser(matched);
                            triggerToast("Login Berhasil (Sesi Lokal): " + matched.fullName);
                            navigateTo('home');
                        } else {
                            triggerToast("Error: " + err.message);
                        }
                    }
                } else {
                    // Simulated Local MySQL Engine
                    console.log(`[SQL ENGINE] EXECUTING QUERY: SELECT * FROM users WHERE LOWER(email) = '${cleanEmail}' AND role = '${loginRole}' LIMIT 1;`);
                    const matched = users.find(u => u.email.toLowerCase() === cleanEmail && u.role === loginRole);
                    if (matched) {
                        setCurrentUser(matched);
                        triggerToast("Selamat datang kembali, " + matched.fullName + "!");
                        addNotificationLocal(matched.id, "Login Berhasil", "Masuk berhasil (Simulasi Tabel Relasional MySQL).");
                        navigateTo('home');
                    } else {
                        triggerToast("Email salah atau peran tidak sesuai!");
                    }
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                const cleanEmail = regEmail.trim().toLowerCase();
                const cleanName = regName.trim();

                if (cleanName.length < 2) {
                    triggerToast("Nama minimal harus 2 karakter!");
                    return;
                }

                if (mysqlApiEnabled && mysqlApiUrl) {
                    try {
                        triggerToast("Mendaftarkan akun ke server MySQL...");
                        const serverUrl = mysqlApiUrl.replace(/\/$/, '');
                        const response = await fetch(`${serverUrl}/api/auth/register`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ fullName: cleanName, email: cleanEmail, role: regRole })
                        }).catch(err => {
                            throw new Error("Gagal mendaftar ke server API: " + err.message);
                        });

                        const result = await response.json();
                        if (response.ok && result.status === 'success') {
                            const newU = result.user;
                            setUsers(prev => {
                                if (prev.some(u => u.id === newU.id)) return prev;
                                return [...prev, newU];
                            });
                            setCurrentUser(newU);
                            triggerToast("Registrasi Berhasil di Database MySQL!");
                            addNotificationLocal(newU.id, "Akun Baru Dibuat", "Halo " + cleanName + ", akun Anda berhasil disimpan di database MySQL.");
                            navigateTo('home');
                        } else {
                            triggerToast(result.message || "Pendaftaran gagal!");
                        }
                    } catch (err) {
                        console.error("MySQL Live Register failed:", err);
                        triggerToast("Koneksi API Gagal: " + err.message);
                    }
                } else {
                    // Simulated Local MySQL Engine
                    console.log(`[SQL ENGINE] EXECUTING CHECK: SELECT id FROM users WHERE LOWER(email) = '${cleanEmail}';`);
                    const exists = users.find(u => u.email.toLowerCase() === cleanEmail);
                    if (exists) {
                        triggerToast("E-mail sudah terdaftar di database local!");
                        return;
                    }

                    const newUserId = 'USR-' + Date.now();
                    const newU = {
                        id: newUserId,
                        fullName: cleanName,
                        email: cleanEmail,
                        role: regRole
                    };

                    console.log(`[SQL ENGINE] EXECUTING INSERT: INSERT INTO users (id, fullName, email, role) VALUES ('${newUserId}', '${cleanName}', '${cleanEmail}', '${regRole}');`);
                    
                    setUsers(prev => [...prev, newU]);
                    setCurrentUser(newU);
                    triggerToast("Pendaftaran Berhasil! Akun disimpan.");
                    addNotificationLocal(newU.id, "Akun Baru Dibuat", "Halo " + cleanName + ", selamat bergabung di hub merchandise kebanggaan Unpad.");
                    navigateTo('home');
                }
            };

            // Actions: Cart operations
            const addToCart = (pId, quantity = 1) => {
                const prd = products.find(p => p.id === pId);
                if (!prd) return;
                const currentQtyInCart = cart.find(item => item.productId === pId)?.quantity || 0;
                if (prd.stock < currentQtyInCart + quantity) {
                    triggerToast("Maaf! Jumlah melebihi stok yang tersedia.");
                    return;
                }
                setCart(prev => {
                    const exists = prev.find(item => item.productId === pId);
                    if (exists) {
                        return prev.map(item => item.productId === pId ? { ...item, quantity: item.quantity + quantity } : item);
                    }
                    return [...prev, { id: 'CRT-' + Date.now(), productId: pId, quantity }];
                });
                triggerToast("Dimasukkan ke keranjang: " + prd.productName);
            };

            const updateCartQuantity = (pId, newQty) => {
                if (newQty <= 0) {
                    setCart(prev => prev.filter(item => item.productId !== pId));
                    return;
                }
                const prd = products.find(p => p.id === pId);

                    triggerToast("Stok tidak mencukupi!");
                    return;

                setCart(prev => prev.map(item => item.productId === pId ? { ...item, quantity: newQty } : item));

                e.preventDefault();

                // Inventory adjustment check
                let stockCheckSucceeded = true;
                const nextProducts = products.map(p => {
                    const cartItem = cart.find(ci => ci.productId === p.id);
                    if (cartItem) {
                        if (p.stock < cartItem.quantity) {
                            stockCheckSucceeded = false;
                        }
                        return { ...p, stock: p.stock - cartItem.quantity };
                    }
                    return p;
                });

                if (!stockCheckSucceeded) {
                    triggerToast("Pesanan gagal! Salah satu item dalam keranjang kehabisan stok.");
                    return;
                }

                // Create Order object matching types
                const orderId = 'ORD-' + Math.floor(1000 + Math.random() * 9000);
                let totalAmount = 0;
                const orderItems = cart.map((it, idx) => {
                    const p = products.find(prd => prd.id === it.productId);
                    totalAmount += p.price * it.quantity;
                    return {
                        id: 'ORI-' + Date.now() + '-' + idx,
                        orderId,
                        productId: it.productId,
                        quantity: it.quantity,
                        price: p.price
                    };
                });

                    id: orderId,
                    userId: currentUser.id,
                    totalAmount,
                    paymentStatus: 'Pending',
                    orderStatus: 'Pending Payment',
                    createdAt: new Date().toISOString(),
                    items: orderItems,
                    shippingAddress: checkoutAddress,
                    phone: checkoutPhone
                };

                // Commit stock deduction & insert order
                setProducts(nextProducts);
                setOrders(prev => [newOrder, ...prev]);
                
                // Clear state
                setCheckoutAddress('');
                setCheckoutPhone('');
                
                triggerToast("Pesanan Berhasil Dibuat! Invoice #" + orderId);
                navigateTo('qris', { orderId });

                            addNotificationLocal(o.userId, "Pembayaran Diterima!", `Pembayaran untuk order ${o.id} sebesar Rp ${o.totalAmount.toLocaleString('id-ID')} telah sukses dikonfirmasi via QRIS.`);
                            return { ...o, paymentStatus: 'Paid', orderStatus: 'Processing' };
                        }
                        return o;
                    }));

                    // Fire staff alert
                    users.filter(u => u.role === 'staff').forEach(st => {
                        addNotificationLocal(st.id, "Pesanan Baru", `Antrean baru masuk #${orderId}. Siap diproses.`);
                    });

                    // Play audio warning simulation
                    try {
                        const audio = new AudioContext();
                        const osc = audio.createOscillator();
                        const gain = audio.createGain();
                        osc.connect(gain);
                        gain.connect(audio.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(880, audio.currentTime);
                        osc.frequency.setValueAtTime(1200, audio.currentTime + 0.15);
                        gain.gain.setValueAtTime(0.3, audio.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.35);
                        osc.start();
                        osc.stop(audio.currentTime + 0.4);
                    } catch (e) {}

                    setCart([]);
                    setIsSimulatingPayment(false);
                    navigateTo('success', { orderId });
                }, 2500);

{`CREATE TABLE users (

);

CREATE TABLE categories (
    id VARCHAR(50) PRIMARY KEY,
    categoryName VARCHAR(100) NOT NULL,
    description TEXT
);

CREATE TABLE products (
    id VARCHAR(50) PRIMARY KEY,
    categoryId VARCHAR(50),
    productName VARCHAR(255) NOT NULL,
    description TEXT,
    price INT NOT NULL,
    stock INT NOT NULL DEFAULT 0,
    image TEXT,
    FOREIGN KEY (categoryId) REFERENCES categories(id) ON DELETE SET NULL
);

CREATE TABLE orders (
    id VARCHAR(50) PRIMARY KEY,
    userId VARCHAR(50),
    totalAmount INT NOT NULL,
    paymentStatus ENUM('Pending', 'Paid', 'Failed') NOT NULL DEFAULT 'Pending',
    orderStatus ENUM('Pending Payment', 'Processing', 'Ready for Pickup', 'Completed', 'Cancelled') NOT NULL DEFAULT 'Pending Payment',

);`}
